<div class="flex h-screen bg-gray-900 text-gray-100">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-800 p-4 hidden md:block">
    <h2 class="text-2xl font-bold mb-6">MyGame</h2>

    <nav>
      <ul class="space-y-3">
        <li>
          <a routerLink="/" class="block p-2 rounded hover:bg-gray-700">
            Início
          </a>
        </li>
        <li>
          <a routerLink="/jogos" class="block p-2 rounded hover:bg-gray-700">
            Jogos
          </a>
        </li>
        <li>
          <a routerLink="/sobre" class="block p-2 rounded hover:bg-gray-700">
            Sobre
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Conteúdo -->
  <div class="flex-1 flex flex-col">

    <!-- Topbar mobile -->
    <header class="bg-gray-800 p-4 md:hidden">
      <h1 class="text-xl font-bold">MyGame</h1>
    </header>

    <!-- Conteúdo principal -->
    <main class="flex-1 p-6 overflow-auto">

  <h1 class="text-3xl font-bold mb-6">Jogos 🎮</h1>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
    
    <div 
      *ngFor="let game of games"
      class="bg-gray-800 rounded-lg overflow-hidden hover:scale-105 transition"
    >
      <img 
        [src]="game.background_image" 
        alt="{{ game.name }}"
        class="w-full h-40 object-cover"
      />

      <div class="p-3">
        <h2 class="text-sm font-semibold">
          {{ game.name }}
        </h2>
      </div>
    </div>

  </div>

</main>
<div class="flex justify-between items-center mb-4">

  <button 
    (click)="loadGames()"
    class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm transition"
  >
    Atualizar
  </button>
</div>

  </div>

</div>
